[options]

; ============================================================
;  ODOO 19 — Configuration principale
; ============================================================

; Mot de passe administrateur (page /web/database/manager)
admin_passwd = admin

; ── Connexion PostgreSQL ────────────────────────────────────
db_host = host.docker.internal
db_port = 5433
db_user = odoo
db_password = odoo
db_name = bd_mobach_odoo19
db_maxconn = 64

; Filestore
data_dir = /var/lib/odoo

; ── Chemins des modules ─────────────────────────────────────
; Ordre de priorité : modules natifs → sources GitHub → custom MOBACH
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons/odoo/addons,

; ── Logs ────────────────────────────────────────────────────
logfile = /var/log/odoo/odoo.log
log_level = info

; ── Réseau ──────────────────────────────────────────────────
http_port = 8069
longpolling_port = 8072
proxy_mode = False

; ── Performance ─────────────────────────────────────────────
;workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; ── Sécurité ────────────────────────────────────────────────
; Mettre False en production pour cacher la liste des bases
list_db = True
